<div class="extension-block folderhider-settings lavender-theme">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b style="color: #9a86d3;">캐릭터 폴더 숨기기 & 목차 설정</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <div class="inline-drawer-content">
            
            <!-- 탭 네비게이션 -->
            <div class="fh-tab-nav">
                <button class="fh-tab-btn active" data-tab="tab_folder_hide">📂 폴더 숨기기</button>
                <button class="fh-tab-btn" data-tab="tab_toc_order">🔢 목차/순서 설정</button>
                <button class="fh-tab-btn" data-tab="tab_backup">💾 백업/복원</button>
            </div>

            <hr class="sysHR" style="margin-top:0;">
			<!-- 업데이트 알림 박스 (JS로 제어) -->
			<div id="update_notice_box" class="notice-box" style="display:none;">
				<div class="notice-header">
					<i class="fa-solid fa-circle-exclamation"></i> 
					<strong>업데이트 알림</strong>
				</div>
				
				<div class="notice-content" id="update_notice_text_area"></div>

				<button id="close_update_notice_btn" class="notice-close-btn">
					확인했습니다 (다시 보지 않기)
				</button>
			</div>

            <!-- 탭 1: 폴더 숨기기 -->
            <div id="tab_folder_hide" class="fh-tab-content active">
                <div class="control-group">
                    <label class="flex-container-checkbox-inline">
                        <input type="checkbox" id="folder_hider_enable_toggle">
                        <span>기능 활성화 (숨기기 및 목차 적용)</span>
                    </label>
                </div>

                <div class="menu-section">
                    <h3>숨길 폴더 추가</h3>
                    <div class="control-group">
                        <label>숨길 폴더 이름 입력 (예: 2차, 백업):</label>
                        <input type="text" id="folder_name_input" placeholder="숨기려는 폴더 이름">
                        <div class="button-row">
                            <button id="add_folder_btn" class="lavender-btn">＋ 폴더 숨김 규칙 추가</button>
                        </div>
                    </div>
                </div>

                <div class="menu-section">
                    <h3>현재 숨긴 폴더 목록</h3>
                    <div class="folder-info">
                        총 <span id="hidden_folder_count">0</span>개 폴더가 숨김 처리 중입니다.
                    </div>
                    <div id="hidden_folder_list_container" class="scrollable-list resizable">
                        <div id="folder_list_placeholder" class="placeholder">
                            숨김 처리된 폴더가 없습니다.
                        </div>
                    </div>
                </div>
            </div>

            <!-- 탭 2: 목차 관리 -->
            <div id="tab_toc_order" class="fh-tab-content">
                <div class="menu-section">
                    <h3>현재 목록 목차(ToC) 관리</h3>
                    <div class="control-group">
                        <label>현재 보고 있는 목록의 순서를 변경하고 구분선을 추가합니다.</label>
                        <p style="font-size:0.85em; color:#666; margin-bottom:10px;">
                            팝업창에서 <b>태그 기반 일괄 선택</b> 및 <b>구분선으로 이동</b> 기능을 사용할 수 있습니다.
                        </p>
                        <button id="open_toc_manager_btn" class="lavender-btn" style="background: linear-gradient(145deg, #d9cff5, #b7a4e0); color: #3a2e5f;">
                            <i class="fa-solid fa-list-ol"></i> 현재 화면 순서/목차 편집 팝업 열기
                        </button>
                        <small style="color: #888; margin-top:5px; display:block;">
                            * 주의: 버튼을 누르면 현재 열려있는 목록(메인 또는 폴더)을 기준으로 설정창이 뜹니다.
                        </small>
                    </div>
                </div>
            </div>

            <!-- 탭 3: 백업 및 복원 -->
            <div id="tab_backup" class="fh-tab-content">
                <div class="menu-section">
                    <h3>설정 백업 및 복원</h3>
                    <div class="control-group">
                        <label>현재 설정(숨김 폴더 + 목차 순서)을 텍스트로 저장하거나 불러옵니다.</label>
                        <textarea id="setting_backup_area" rows="3" placeholder="내보내기 버튼을 누르면 여기에 설정 코드가 나타납니다."></textarea>
                        <div class="button-row" style="display:flex; gap:10px;">
                            <button id="export_settings_btn" class="lavender-btn" style="flex:1;">📤 내보내기</button>
                            <button id="import_settings_btn" class="lavender-btn" style="flex:1; background: linear-gradient(145deg, #cfd9f5, #a4b7e0);">📥 가져오기</button>
                        </div>
                        <small style="color: #888; margin-top:5px;">
                            * 가져오기 시 현재 설정은 덮어씌워집니다. <br>
                            * 불러온 설정에 없는 새로운 캐릭터는 목록의 최하단에 자동으로 추가됩니다 (유동성 대응).
                        </small>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
/* =============================
   🎨 라벤더 테마 및 공통 스타일
============================= */
.lavender-theme {
    --accent-color: #bfaee3;
    --secondary-color: #d7c9f5;
    --border-color: #cfc7e3;
    --bg-color: #f8f6fb;
    --text-color: #3a2e5f;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    color: var(--text-color);
}

.folderhider-settings .inline-drawer-content {
    background-color: var(--bg-color);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 4px 12px rgba(186, 172, 224, 0.2);
}

/* 탭 스타일 */
.fh-tab-nav {
    display: flex;
    gap: 5px;
    margin-bottom: 15px;
}
.fh-tab-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    background: transparent;
    border-bottom: 3px solid transparent;
    font-weight: 600;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
}
.fh-tab-btn:hover {
    color: var(--text-color);
    background-color: rgba(0,0,0,0.02);
}
.fh-tab-btn.active {
    color: #9a86d3;
    border-bottom: 3px solid #9a86d3;
}
.fh-tab-content {
    display: none;
    animation: fadeIn 0.3s ease;
}
.fh-tab-content.active {
    display: block;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }


.folderhider-settings .menu-section { margin-bottom: 30px; }
.folderhider-settings .menu-section h3 {
    font-size: 1rem;
    font-weight: 600;
    color: #9a86d3;
    margin-bottom: 16px;
    position: relative;
    padding-right: 10px;
}
.folderhider-settings .menu-section h3::after {
    content: "";
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 5px;
    height: 18px;
    background-color: var(--secondary-color);
    border-radius: 3px;
}

.folderhider-settings .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
}

.folderhider-settings input[type="text"],
.folderhider-settings textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.9rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background-color: #fff;
    color: var(--text-color);
    resize: vertical;
}
.folderhider-settings input[type="text"]:focus,
.folderhider-settings textarea:focus {
    border-color: #9a86d3;
    box-shadow: 0 0 0 2px rgba(154, 134, 211, 0.15);
}

.folderhider-settings .flex-container-checkbox-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    cursor: pointer;
}

.lavender-btn {
    display: inline-block;
    width: 100%;
    padding: 10px 0;
    border: none;
    border-radius: 8px;
    background: linear-gradient(145deg, #d9cff5, #b7a4e0);
    color: #3a2e5f;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(170, 150, 220, 0.3);
    transition: all 0.25s ease;
}
.lavender-btn:hover {
    background: linear-gradient(145deg, #cfc1f0, #aa96dc);
    transform: translateY(-1px);
}

.folderhider-settings .scrollable-list {
    max-height: 200px;
    overflow-y: scroll;
    padding: 8px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.folderhider-settings .scrollable-list::-webkit-scrollbar { width: 0px; background: transparent; }

.folderhider-settings .folder-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: #f9f7fd;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.folderhider-settings .folder-name {
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-grow: 1;
}

.folderhider-settings .delete-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-left: 8px;
    padding: 5px 10px;
    border: none;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #3a2e5f;
    background: linear-gradient(145deg, #e5dbfa, #c7b5ef);
    cursor: pointer;
}
.folderhider-settings .delete-btn:hover {
    background: linear-gradient(145deg, #d9cbf5, #b8a2e5);
}

.folderhider-settings .sysHR {
    border: none;
    border-top: 1px dashed var(--border-color);
    margin: 25px 0;
}
.placeholder { text-align: center; color: #aaa; padding: 12px 0; }

.folderhider-settings .fa, .folderhider-settings .fa-solid {
    color: #ffffff !important; filter: none !important;
}

/* 알림 박스 스타일 */
.notice-box {
    background-color: #fff4e5;
    border: 1px solid #ffcc80;
    color: #663c00;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    animation: fadeIn 0.5s;
}
.notice-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    color: #ef6c00;
}
.notice-header i {
    color: #ef6c00 !important; /* 아이콘 색상 강제 적용 */
}
.notice-content p {
    margin: 0 0 10px 0;
    line-height: 1.4;
}
.notice-close-btn {
    background: #fff;
    border: 1px solid #ffb74d;
    color: #ef6c00;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.8rem;
    width: 100%;
    transition: background 0.2s;
}
.notice-close-btn:hover {
    background: #fff3e0;
}
</style>
