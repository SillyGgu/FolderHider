<div class="extension-block folderhider-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b style="color: #9a86d3;">캐릭터 폴더 숨기기 & 목차 설정</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <div class="inline-drawer-content">
            
            <!-- 탭 네비게이션 -->
            <div class="fh-tab-nav">
                <button class="fh-tab-btn active" data-tab="tab_folder_hide">📂 폴더 숨기기</button>
                <button class="fh-tab-btn" data-tab="tab_toc_order">🔢 목차/순서 설정</button>
                <button class="fh-tab-btn" data-tab="tab_backup">💾 백업/복원</button>
            </div>

            <hr class="sysHR" style="margin-top:0;">
			<!-- 업데이트 알림 박스 (JS로 제어) -->
			<div id="update_notice_box" class="notice-box" style="display:none;">
				<div class="notice-header">
					<i class="fa-solid fa-circle-exclamation"></i> 
					<strong>업데이트 알림</strong>
				</div>
				
				<div class="notice-content" id="update_notice_text_area"></div>

				<button id="close_update_notice_btn" class="notice-close-btn">
					확인했습니다 (다시 보지 않기)
				</button>
			</div>

            <!-- 탭 1: 폴더 숨기기 -->
            <div id="tab_folder_hide" class="fh-tab-content active">
                <div class="control-group">
                    <label class="flex-container-checkbox-inline">
                        <input type="checkbox" id="folder_hider_enable_toggle">
                        <span>기능 활성화 (숨기기 및 목차 적용)</span>
                    </label>
                </div>
                <div class="control-group" id="theme_selector_container">
                </div>
                <hr class="sysHR">

                <div class="menu-section">
                    <h3>숨길 폴더 추가</h3>
                    <div class="control-group">
                        <label>숨길 폴더 이름 입력 (예: 2차, 백업):</label>
                        <input type="text" id="folder_name_input" placeholder="숨기려는 폴더 이름">
                        <div class="button-row">
                            <button id="add_folder_btn" class="lavender-btn">＋ 폴더 숨김 규칙 추가</button>
                        </div>
                    </div>
                </div>

                <div class="menu-section">
                    <h3>현재 숨긴 폴더 목록</h3>
                    <div class="folder-info">
                        총 <span id="hidden_folder_count">0</span>개 폴더가 숨김 처리 중입니다.
                    </div>
                    <div id="hidden_folder_list_container" class="scrollable-list resizable">
                        <div id="folder_list_placeholder" class="placeholder">
                            숨김 처리된 폴더가 없습니다.
                        </div>
                    </div>
                </div>
            </div>

            <!-- 탭 2: 목차 관리 -->
            <div id="tab_toc_order" class="fh-tab-content">
                <div class="menu-section">
                    <h3>현재 목록 목차(ToC) 관리</h3>
                    <div class="control-group">
                        <label>현재 보고 있는 목록의 순서를 변경하고 구분선을 추가합니다.</label>
                        <p style="font-size:0.85em; opacity: 0.8; margin-bottom:10px;">
                            팝업창에서 <b>태그 기반 일괄 선택</b> 및 <b>구분선으로 이동</b> 기능을 사용할 수 있습니다.
                        </p>
                        <button id="open_toc_manager_btn" class="lavender-btn">
                            <i class="fa-solid fa-list-ol"></i> 현재 화면 순서/목차 편집 팝업 열기
                        </button>
                        <small style="opacity: 0.7; margin-top:5px; display:block;">
                            * 주의: 버튼을 누르면 현재 열려있는 목록(메인 또는 폴더)을 기준으로 설정창이 뜹니다.
                        </small>
                    </div>
                </div>
            </div>

            <!-- 탭 3: 백업 및 복원 -->
            <div id="tab_backup" class="fh-tab-content">
                <div class="menu-section">
                    <h3>설정 백업 및 복원</h3>
                    <div class="control-group">
                        <label>현재 설정(숨김 폴더 + 목차 순서)을 텍스트로 저장하거나 불러옵니다.</label>
                        <textarea id="setting_backup_area" rows="3" placeholder="내보내기 버튼을 누르면 여기에 설정 코드가 나타납니다."></textarea>
                        <div class="button-row" style="display:flex; gap:10px;">
                            <button id="export_settings_btn" class="lavender-btn" style="flex:1;">📤 내보내기</button>
                            <button id="import_settings_btn" class="lavender-btn" style="flex:1;">📥 가져오기</button>
                        </div>
                        <small style="opacity: 0.7; margin-top:5px;">
                            * 가져오기 시 현재 설정은 덮어씌워집니다. <br>
                            * 불러온 설정에 없는 새로운 캐릭터는 목록의 최하단에 자동으로 추가됩니다 (유동성 대응).
                        </small>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<style>

.folderhider-settings {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    line-height: 1.5;
    color: var(--fh-text);
    font-size: 0.9rem;
}

.folderhider-settings .inline-drawer-content {
    background-color: var(--fh-bg) !important;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    color: var(--fh-text);
    border: 1px solid var(--fh-border);
}

/* 탭 네비게이션 */
.fh-tab-nav {
    display: flex;
    gap: 3px;
    margin-bottom: 12px;
    border-bottom: 1.5px solid var(--fh-border);
}
.fh-tab-btn {
    flex: 1;
    padding: 7px 0;
    border: none;
    background: transparent;
    border-bottom: 2.5px solid transparent;
    font-weight: 600;
    font-size: 0.82rem;
    color: var(--fh-text);
    opacity: 0.55;
    cursor: pointer;
    transition: all 0.18s;
    margin-bottom: -1.5px;
}
.fh-tab-btn:hover {
    opacity: 0.85;
    background-color: var(--fh-hover-bg);
}
.fh-tab-btn.active {
    opacity: 1;
    color: var(--fh-accent);
    border-bottom: 2.5px solid var(--fh-accent);
    background-color: var(--fh-hover-bg);
}

/* 탭 콘텐츠 */
.fh-tab-content {
    display: none;
    animation: fadeInTab 0.22s ease;
}
.fh-tab-content.active {
    display: block;
}

@keyframes fadeInTab {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* 팔레트 */
.fh-palette-row {
    display: flex;
    gap: 10px;
    margin: 6px 0 8px;
    flex-wrap: wrap;
}
.fh-palette-item {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    border: 2px solid var(--fh-border);
    transition: transform 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
}
.fh-palette-item:hover { transform: scale(1.1); }
.fh-palette-item.active {
    border-color: var(--fh-accent);
    transform: scale(1.15);
    box-shadow: 0 0 0 2px var(--fh-bg), 0 0 0 3.5px var(--fh-accent);
}

/* 섹션 */
.folderhider-settings .menu-section { margin-bottom: 16px; }
.folderhider-settings .menu-section h3 {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--fh-accent);
    margin-bottom: 10px;
    padding-left: 9px;
    border-left: 3px solid var(--fh-secondary);
}
.folderhider-settings .menu-section h3::after { display: none; }

.folderhider-settings .control-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 12px;
}

/* 입력창 */
.folderhider-settings input[type="text"],
.folderhider-settings textarea {
    width: 100%;
    padding: 8px 10px;
    font-size: 0.88rem;
    border-radius: 6px;
    background-color: var(--fh-bg);
    color: var(--fh-text);
    border: 1px solid var(--fh-border);
    resize: vertical;
    transition: border-color 0.18s;
    box-sizing: border-box;
}
.folderhider-settings input[type="text"]:focus,
.folderhider-settings textarea:focus {
    border-color: var(--fh-accent);
    box-shadow: 0 0 0 2px var(--fh-hover-bg);
    outline: none;
}

/* 체크박스 */
.folderhider-settings .flex-container-checkbox-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--fh-text);
    font-weight: 500;
}
.folderhider-settings .flex-container-checkbox-inline input {
    width: 15px; height: 15px; accent-color: var(--fh-accent);
}

/* 버튼 */
.lavender-btn {
    display: inline-block;
    width: 100%;
    padding: 8px 0;
    border: 1px solid var(--fh-border);
    border-radius: 7px;
    background: linear-gradient(135deg, var(--fh-btn-grad-1), var(--fh-btn-grad-2));
    color: var(--fh-btn-text);
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: all 0.18s ease;
    text-align: center;
}
.lavender-btn:hover {
    filter: brightness(1.07);
    transform: translateY(-1px);
    box-shadow: 0 3px 7px rgba(0,0,0,0.12);
}
.lavender-btn:active { transform: translateY(0); }

/* 스크롤 목록 */
.folderhider-settings .scrollable-list {
    max-height: 160px;
    overflow-y: auto;
    padding: 7px;
    border: 1px solid var(--fh-border);
    border-radius: 8px;
    background: var(--fh-bg);
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.folderhider-settings .scrollable-list::-webkit-scrollbar { width: 4px; }
.folderhider-settings .scrollable-list::-webkit-scrollbar-thumb {
    background: var(--fh-secondary);
    border-radius: 2px;
}

.folderhider-settings .folder-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: var(--fh-hover-bg);
    color: var(--fh-text);
    border-radius: 5px;
    border: 1px solid var(--fh-border);
    font-size: 0.88rem;
}
.folderhider-settings .folder-name {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-grow: 1;
    color: var(--fh-text);
}

.folderhider-settings .delete-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: 8px;
    padding: 4px 9px;
    border: 1px solid var(--fh-border);
    border-radius: 5px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--fh-btn-text);
    background: var(--fh-secondary);
    cursor: pointer;
    transition: filter 0.15s;
}
.folderhider-settings .delete-btn:hover { filter: brightness(0.88); }

.folderhider-settings .sysHR {
    border: none;
    border-top: 1px dashed var(--fh-border);
    margin: 14px 0;
    opacity: 0.6;
}
.placeholder {
    text-align: center;
    color: var(--fh-text);
    opacity: 0.55;
    padding: 14px 0;
    font-style: italic;
    font-size: 0.85rem;
}

.folderhider-settings .fa, .folderhider-settings .fa-solid {
    color: inherit;
}

/* 업데이트 알림 박스 */
.notice-box {
    background-color: #fff4e5;
    border: 1px solid #ffcc80;
    color: #663c00;
    padding: 11px 13px;
    border-radius: 7px;
    margin-bottom: 14px;
    font-size: 0.88rem;
    animation: fadeIn 0.4s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.notice-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    color: #ef6c00;
    font-weight: bold;
    font-size: 0.9rem;
}
.notice-content p {
    margin: 0 0 10px 0;
    line-height: 1.5;
}
.notice-close-btn {
    background: #fff;
    border: 1px solid #ffb74d;
    color: #ef6c00;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.8rem;
    width: 100%;
    transition: background 0.18s;
}
.notice-close-btn:hover { background: #fff3e0; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* 모바일 대응 */
@media (max-width: 600px) {
    .toc-manager-modal {
        padding: 0 !important;
        border-radius: 10px !important;
    }
    .toc-header,
    .toc-footer {
        padding: 10px 12px !important;
    }
    .toc-body,
    #pm_list_body,
    #toc_items_list {
        padding: 8px 10px !important;
    }
    .toc-toolbar {
        padding: 8px 10px !important;
        gap: 5px !important;
    }
    .toc-toolbar-row {
        flex-wrap: wrap !important;
        gap: 4px !important;
        overflow-x: unset !important;
    }
    .toc-toolbar-row input[type="text"],
    .toc-toolbar-row select {
        flex: 1 1 80px !important;
        min-width: 0 !important;
        max-width: unset !important;
        font-size: 0.78rem !important;
        padding: 4px 6px !important;
        box-sizing: border-box;
    }
    .toc-toolbar-row button {
        flex: 1 1 auto !important;
        font-size: 0.78rem !important;
        padding: 4px 7px !important;
        white-space: nowrap;
    }
    .toc-toolbar-row span {
        font-size: 0.78rem !important;
        white-space: nowrap;
        flex-shrink: 0;
        align-self: center;
    }
    #pm_toggle_images_label,
    label:has(#pm_toggle_images) {
        display: inline-flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 3px !important;
        white-space: nowrap !important;
        font-size: 0.78rem !important;
        flex-shrink: 0;
    }
    label:has(#pm_toggle_images) * {
        display: inline !important;
        white-space: nowrap !important;
    }
    .toc-footer .lavender-btn {
        font-size: 0.78rem !important;
        padding: 5px 8px !important;
    }
    #pm_modal_inner .toc-toolbar-row:last-child {
        flex-direction: column !important;
        align-items: stretch !important;
    }
    #pm_modal_inner .toc-toolbar-row:last-child > div {
        justify-content: flex-start !important;
    }
    #pm_modal_inner .toc-toolbar-row:last-child select,
    #pm_modal_inner .toc-toolbar-row:last-child button#pm_execute_move {
        flex: 1 1 auto !important;
        width: 100% !important;
    }
}
</style>
